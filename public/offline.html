<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CuePay - Offline</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .offline-card {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
        }
        .offline-icon { font-size: 4rem; margin-bottom: 20px; }
        h1 { color: #00d4ff; margin-bottom: 10px; font-size: 1.5rem; }
        p { color: #8888aa; margin-bottom: 20px; line-height: 1.6; }
        .retry-btn {
            background: #00d4ff;
            color: #0a0a14;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .cached-data {
            background: rgba(0,212,255,0.1);
            border: 1px solid rgba(0,212,255,0.2);
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            font-size: 0.85rem;
            color: #00d4ff;
        }
    </style>
</head>
<body>
    <div class="offline-card">
        <div class="offline-icon">📡</div>
        <h1>You're Offline</h1>
        <p>No internet connection detected. Check your connection and try again.</p>
        <button onclick="location.reload()" class="retry-btn">Retry Connection</button>
        <div class="cached-data">
            💾 Last cached data will be shown when available
        </div>
    </div>
</body>
</html>
